<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>静かな展示室｜0㎝の美術館</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="gallery-page">
  <main class="gallery-room">

    <a href="index.html" class="back-link gallery-back-link">
      小さな扉へ戻る
      <span>Back to the small door</span>
    </a>

    <header class="gallery-header">
      <p class="site-ja">0㎝の美術館</p>

      <h1 class="gallery-title gallery-title-layer">
        <span class="gallery-title-ja">静かな展示室</span>
        <span class="gallery-title-en-near">The Quiet Gallery</span>
      </h1>

      <p class="gallery-message">
        すぐそばに。<br>
        <span>Right beside you.</span>
      </p>
    </header>

    <section class="moving-gallery" aria-label="作品がゆっくり流れる展示室">
      <div class="gallery-track">
        <article class="art-card">
          <img src="images/art01.jpg" alt="作品1">
          <p>In the Light<br>ひかりの中で</p>
        </article>

        <article class="art-card">
          <img src="images/art02.jpg" alt="作品2">
          <p>Together, Even in Dreams<br>夢でも一緒</p>
        </article>

        <article class="art-card">
          <img src="images/art03.jpg" alt="作品3">
          <p>Finding Spring<br>春を見つけて</p>
        </article>

        <article class="art-card">
          <img src="images/art04.jpg" alt="作品4">
          <p>Being Beside<br>寄り添い</p>
        </article>

        <article class="art-card">
          <img src="images/art01.jpg" alt="">
          <p>In the Light<br>ひかりの中で</p>
        </article>

        <article class="art-card">
          <img src="images/art02.jpg" alt="">
          <p>Together, Even in Dreams<br>夢でも一緒</p>
        </article>

        <article class="art-card">
          <img src="images/art03.jpg" alt="">
          <p>Finding Spring<br>春を見つけて</p>
        </article>

        <article class="art-card">
          <img src="images/art04.jpg" alt="">
          <p>Being Beside<br>寄り添い</p>
        </article>
      </div>
    </section>

  </main>
</body>
</html>
