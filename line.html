<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線画の世界｜0㎝の美術館</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="line-page">
  <main class="line-room">
    <header class="line-header">
      <p class="site-ja">0㎝の美術館</p>

      <h1 class="line-title">線画の世界へようこそ</h1>
      <p class="line-subtitle">Welcome to the World of Line Art</p>

      <p class="line-message">
        白と黒のあいだに、<br>
        小さな世界がつづいている。<br>
        <span>Between black and white, a small world goes on and on.</span>
      </p>
    </header>

    <section class="line-gallery" aria-label="線画作品の展示室">
      <div class="line-grid">
        <article class="line-card">
          <img src="images/line01.jpg" alt="線画作品1">
          <p>Line 01</p>
        </article>

        <article class="line-card">
          <img src="images/line02.jpg" alt="線画作品2">
          <p>Line 02</p>
        </article>

        <article class="line-card">
          <img src="images/line03.jpg" alt="線画作品3">
          <p>Line 03</p>
        </article>

        <article class="line-card">
          <img src="images/line04.jpg" alt="線画作品4">
          <p>Line 04</p>
        </article>

        <article class="line-card">
          <img src="images/line05.jpg" alt="線画作品5">
          <p>Line 05</p>
        </article>

        <article class="line-card">
          <img src="images/line06.jpg" alt="線画作品6">
          <p>Line 06</p>
        </article>
      </div>
    </section>

    <a href="index.html" class="back-link">
      小さな扉へ戻る
      <span>Back to the small door</span>
    </a>
  </main>
</body>
</html>
