<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>どの色からはじまると思う？ | 0㎝の美術館</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="poster-wrap" aria-label="0㎝の美術館 Instagram投稿デザイン">
    <article class="poster">
      <div class="pencil-band" aria-label="色鉛筆の写真">
        <img src="images/pencils.jpg" alt="並んだ色鉛筆の写真">
      </div>

      <section class="question" aria-label="問いかけ">
        <p class="question-ja">
          どの色から<br>
          はじまると思う？
        </p>
        <p class="question-en">Which color would you choose first?</p>
      </section>

      <figure class="art-card">
        <img src="images/art.jpg" alt="子どもたちと太陽の色鉛筆画">
      </figure>

      <footer class="poster-footer">
        <p class="museum-name">0㎝の美術館 / 0cm Museum</p>
        <p class="site-url">sora-ne.com</p>
      </footer>
    </article>
  </main>
</body>
</html>
